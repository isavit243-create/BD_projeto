{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <div>
        <div class="page-title">Editar Role</div>
        <div class="page-subtitle">Atualizar perfil de acesso</div>
    </div>
    <a href="/roles/" class="btn btn-edit">← Voltar</a>
</div>

<div class="card">
    <div class="form-wrap">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nome</label>
                <input type="text" name="nome" value="{{ role.1 }}">
            </div>
            <div class="form-group">
                <label>Descrição</label>
                <textarea name="descricao">{{ role.2 }}</textarea>
            </div>
            <button type="submit" class="btn-submit">Atualizar</button>
        </form>
    </div>
</div>

{% endblock %}
