{% extends 'base.html' %}
{% block content %}

<div class="page-header">
    <div>
        <div class="page-title">Chats</div>
        <div class="page-subtitle">Mensagens associadas a tickets</div>
    </div>
    <a href="/chats/" class="btn btn-primary">+ Nova Mensagem</a>
</div>

<div class="card">
    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Mensagem</th>
                    <th>Data</th>
                    <th>Utilizador</th>
                    <th>Ticket</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for chat in chats %}
                <tr>
                    <td style="color:var(--muted);font-size:12px;">#{{ chat.0 }}</td>
                    <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ chat.1 }}</td>
                    <td style="color:var(--muted);font-size:12px;">{{ chat.2 }}</td>
                    <td>{{ chat.3 }}</td>
                    <td>{{ chat.4 }}</td>
                    <td>
                        <div class="actions">
                            <a href="{% url 'editar_chat' chat.0 %}" class="btn btn-edit">✏ Editar</a>
                            <a href="{% url 'eliminar_chat' chat.0 %}" class="btn btn-delete">✕ Eliminar</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
